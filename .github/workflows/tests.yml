name: tests

on:
  push:
  pull_request:

jobs:
  lightweight-python:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install lightweight test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pandas numpy pytest

      - name: Run lightweight tests
        run: pytest

  nextflow-stub-smoke:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Nextflow
        uses: nextflow-io/setup-nextflow@v2

      - name: Run Nextflow stub smoke
        run: |
          nextflow run main.nf \
            --matrix_dir tests/fixtures/tiny_10x \
            --sample tiny \
            --species human \
            --genome test \
            --outdir results/nextflow_stub \
            --min_features 2 \
            --max_features 100 \
            --max_mt 100 \
            -stub-run

      - name: Assert Nextflow output contract
        run: |
          test -f results/nextflow_stub/tiny/scanpy/run_summary.json
          test -f results/nextflow_stub/tiny/scanpy/output_manifest.json
          test -f results/nextflow_stub/tiny/scanpy/objects/tiny.h5ad
          test -f results/nextflow_stub/tiny/seurat/run_summary.json
          test -f results/nextflow_stub/tiny/seurat/output_manifest.json
          test -f results/nextflow_stub/tiny/seurat/objects/tiny.rds

  scanpy-smoke:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Create Scanpy environment
        uses: mamba-org/setup-micromamba@v2
        with:
          environment-file: envs/scanpy.yml
          environment-name: singlecell-python
          cache-environment: true
          cache-downloads: true

      - name: Run Scanpy smoke test
        shell: bash -el {0}
        run: |
          python python/01_scanpy_pbmc_qc_cluster.py \
            --input tests/fixtures/tiny_10x \
            --outdir results/tiny/scanpy \
            --sample tiny \
            --species human \
            --genome test \
            --min-features 2 \
            --max-features 100 \
            --max-mt 100 \
            --cluster-resolution 0.2
          test -f results/tiny/scanpy/run_summary.json
          test -f results/tiny/scanpy/output_manifest.json
          test -f results/tiny/scanpy/objects/tiny.h5ad

  seurat-smoke:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Create Seurat environment
        uses: mamba-org/setup-micromamba@v2
        with:
          environment-file: envs/seurat.yml
          environment-name: singlecell-r
          cache-environment: true
          cache-downloads: true

      - name: Run Seurat smoke test
        shell: bash -el {0}
        run: |
          Rscript R/01_seurat_pbmc_qc_cluster.R \
            --input tests/fixtures/tiny_10x \
            --outdir results/tiny/seurat \
            --sample tiny \
            --species human \
            --genome test \
            --min-features 2 \
            --max-features 100 \
            --max-mt 100 \
            --cluster-resolution 0.2
          test -f results/tiny/seurat/run_summary.json
          test -f results/tiny/seurat/output_manifest.json
          test -f results/tiny/seurat/objects/tiny.rds
